server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Return 503 (Service Unavailable) for all requests
    # with the maintenance page as the body.
    # This status code:
    #   - tells search engines the site is temporarily down
    #   - lets the JS health-check distinguish maintenance (503) from live app (200)
    error_page 503 /503.html;

    location / {
        return 503;
    }

    location = /503.html {
        internal;
        add_header Cache-Control  "no-store, no-cache, must-revalidate" always;
        add_header Retry-After    30                                    always;
    }

    # Serve the deploy timestamp so all clients share the same start time
    location = /data/deploy_time.json {
        add_header Cache-Control  "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        default_type application/json;
        try_files /data/deploy_time.json =404;
    }
}
