name: Bot Core PR Check

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '*.py'
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/pr-bot-core.yml'

jobs:
  test-bot-core:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-mock pytest-cov aiohttp discord.py

    - name: Run Bot Core Unit Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python3 -m pytest tests/ -v --cov=. --cov-report=xml
      env:
        SERVER_ID: "123456789"
        BOT_TOKEN: "dummy_token"
        ADMIN_ROLE: "Admin"
        DEV_ID: "987654321"
        TEAM_ID: "184"
        URL: "https://example.com/wp-json/wc/v3/orders/"
        MATCH_CHANNEL_ID: "111222333"
        LEAGUE_ANNOUNCEMENTS_CHANNEL_ID: "444555666"
        WC_KEY: "dummy_wc_key"
        WC_SECRET: "dummy_wc_secret"

    - name: Upload Bot Core coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: botcore
        name: bot-core-check
        fail_ci_if_error: false
