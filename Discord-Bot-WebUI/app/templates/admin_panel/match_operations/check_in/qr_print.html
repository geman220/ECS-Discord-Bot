<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ match_label }} — Check-In QR</title>
    <style>
        @page { size: letter; margin: 0.5in; }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            color: #111;
            background: #fff;
        }
        .sheet {
            max-width: 7.5in;
            margin: 0 auto;
            text-align: center;
        }
        .branding {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #047857;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            line-height: 1.15;
        }
        .meta {
            font-size: 1rem;
            color: #4b5563;
            margin-bottom: 2rem;
        }
        .qr-wrap {
            display: inline-block;
            padding: 1.25rem;
            border: 4px solid #047857;
            border-radius: 1rem;
            background: #fff;
        }
        .qr-wrap img { display: block; width: 4.25in; height: 4.25in; }
        .instructions {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: #111;
        }
        .footer-note {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #6b7280;
        }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="sheet">
        <div class="branding">Emerald City Supporters</div>
        <h1>{{ match_label }}</h1>
        <div class="meta">
            {% if kickoff %}{{ kickoff.strftime('%A, %B %-d &middot; %-I:%M %p')|safe }}{% endif %}
            {% if location %} &middot; {{ location }}{% endif %}
        </div>

        <div class="qr-wrap">
            <img src="{{ qr_url }}" alt="Match check-in QR">
        </div>

        <div class="instructions">Scan to check in</div>
        <div class="footer-note">
            Open the ECS FC app, then scan this code with your phone's camera.
        </div>

        <div class="no-print" style="margin-top:2rem;">
            <button onclick="window.print()" style="padding:0.6rem 1.2rem;font-size:0.95rem;border-radius:0.5rem;border:0;background:#047857;color:#fff;cursor:pointer;">
                Print this page
            </button>
        </div>
    </div>
</body>
</html>
