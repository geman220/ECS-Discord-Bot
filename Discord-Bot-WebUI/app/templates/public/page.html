{% extends "public/base_public.html" %}
{% from 'public/_hero.html' import hero %}

{% block content %}
{# Pages built in the visual builder carry their own <style> + full layout, so
   render them FULL-WIDTH exactly as built (no prose clamp, no extra hero).
   Simple rich-text pages get the (per-page editable) hero + prose column. #}
{% set is_builder = page and page.body_html and '<style' in page.body_html %}
{% set _h = (page.hero if page else {}) or {} %}

{% if is_builder %}
<div class="ps-builder-page">
    {{ page.body_html | safe }}
</div>
{% else %}
{{ hero(page.title if page and page.title else title_fallback,
        size=_h.get('size', 'md'),
        bg_color=_h.get('bg_color'),
        text_color=_h.get('text_color'),
        image=_h.get('image'),
        overlay=_h.get('overlay', 'medium'),
        align=_h.get('align', 'left')) }}

<section class="py-14 sm:py-16">
    <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
        <div class="prose prose-lg dark:prose-invert max-w-none
                    prose-headings:text-gray-900 dark:prose-headings:text-white
                    prose-a:text-ecs-green dark:prose-a:text-ecs-blue-600
                    prose-img:rounded-2xl prose-img:w-full prose-img:shadow-sm prose-figure:my-8
                    [&_.lead]:text-xl [&_.lead]:text-gray-600 dark:[&_.lead]:text-gray-300 [&_.lead]:font-normal">
            {% if page and page.body_html %}
                {{ page.body_html | safe }}
            {% else %}
                <p>This page is being updated. Please <a href="{{ url_for('public.contact') }}">get in touch</a> if you need this information.</p>
            {% endif %}
        </div>
        <div class="mt-10">
            <a href="{{ cta.url }}" class="inline-flex items-center gap-2 rounded-lg bg-ecs-green px-6 py-3 text-base font-semibold text-white hover:bg-ecs-green-dark transition">
                <i class="ti ti-user-plus"></i> {{ cta.label }}
            </a>
        </div>
    </div>
</section>
{% endif %}
{% endblock %}
