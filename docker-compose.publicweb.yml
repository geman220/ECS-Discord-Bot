# docker-compose.publicweb.yml
# =============================================================================
# Separate "publicweb" container for the public marketing site — SAME codebase,
# SAME DB/Redis, so you can restart the portal (webui) WITHOUT dropping the
# public site, and vice-versa. This is an OVERRIDE file: it does not modify the
# main docker-compose.yml.
#
# Apply (after validating):
#   docker-compose -f docker-compose.yml -f docker-compose.publicweb.yml config      # validate
#   docker-compose -f docker-compose.yml -f docker-compose.publicweb.yml up -d publicweb
#
# Routing: serves ecspubleague.org (+ www) — ready for the DNS cutover. It does
# NOT touch portal.ecsfc.com routing, so the working portal is unaffected.
# Pre-cutover it simply receives no traffic until DNS points at the box.
#
# It shares the bind-mounted code + the built /static/vite-dist. Like webui it
# runs `npm run build` on every boot, so a `restart publicweb` always ships a
# fresh bundle (hot-swaps .py/template/JS-source too — no image rebuild).
# Full image rebuild only needed on a requirements.txt change (rebuild webui).
#
# NOTE: publicweb and webui share the same bind-mounted /app, so they both write
# to the SAME static/vite-dist when they build. That's harmless (identical code
# => identical bundle) as long as you don't reboot BOTH at the exact same second.
# Restart them one at a time (that's the whole point of the split).
# =============================================================================
services:
  publicweb:
    build:
      context: ./Discord-Bot-WebUI
      dockerfile: Dockerfile.webui
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: >
      sh -c "chmod +x node_modules/.bin/* node_modules/@esbuild/*/bin/* 2>/dev/null;
      npm run build &&
      gunicorn
      --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker
      --workers 2
      --bind 0.0.0.0:5000
      --log-level info
      --access-logfile -
      --error-logfile -
      --timeout 120
      --graceful-timeout 120
      --keep-alive 65
      --max-requests 5000
      --max-requests-jitter 100
      --name publicweb
      wsgi:application"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app
      - TZ=America/Los_Angeles
      - REDIS_URL=redis://redis:6379/0
      - REDIS_MAX_CONNECTIONS=30
    env_file:
      - .env
    volumes:
      - ./Discord-Bot-WebUI:/app
      - ./Discord-Bot-WebUI/instance/firebase-service-account.json:/app/instance/firebase-service-account.json
      # CRITICAL: publicweb's OWN build output, isolated from webui. Both containers
      # share the /app bind-mount, and BOTH run `npm run build` into
      # app/static/vite-dist. Without this, a publicweb rebuild rewrites the SAME
      # tailwind.css/bundle the live portal is serving -> portal flashes unstyled
      # for the ~30-60s of the build. This named volume gives publicweb a private
      # vite-dist, so its build can never touch the portal's assets (and vice-versa).
      # Media (static/img/publeague) is elsewhere under /app, so it stays shared.
      - publicweb_vitedist:/app/app/static/vite-dist
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS
      - "traefik.http.routers.publicweb.rule=Host(`ecspubleague.org`) || Host(`www.ecspubleague.org`)"
      - "traefik.http.routers.publicweb.entrypoints=web"
      - "traefik.http.routers.publicweb.middlewares=redirect-to-https"
      # HTTPS (public marketing host)
      - "traefik.http.routers.publicweb-secure.rule=(Host(`ecspubleague.org`) || Host(`www.ecspubleague.org`)) && !PathPrefix(`/socket.io`)"
      - "traefik.http.routers.publicweb-secure.entrypoints=websecure"
      - "traefik.http.routers.publicweb-secure.tls=true"
      - "traefik.http.routers.publicweb-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.publicweb-secure.priority=10"
      - "traefik.http.routers.publicweb-secure.service=publicweb"
      - "traefik.http.routers.publicweb-secure.middlewares=public-headers,gzip-compress"
      # Static assets (no rate limit) for the public host
      - "traefik.http.routers.publicweb-static.rule=(Host(`ecspubleague.org`) || Host(`www.ecspubleague.org`)) && PathPrefix(`/static/`)"
      - "traefik.http.routers.publicweb-static.entrypoints=websecure"
      - "traefik.http.routers.publicweb-static.tls=true"
      - "traefik.http.routers.publicweb-static.tls.certresolver=myresolver"
      - "traefik.http.routers.publicweb-static.priority=30"
      - "traefik.http.routers.publicweb-static.service=publicweb"
      - "traefik.http.routers.publicweb-static.middlewares=public-headers,gzip-compress"
      # Socket.IO (if any public realtime) — no rate limit
      - "traefik.http.routers.publicweb-socketio.rule=(Host(`ecspubleague.org`) || Host(`www.ecspubleague.org`)) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.publicweb-socketio.entrypoints=websecure"
      - "traefik.http.routers.publicweb-socketio.tls=true"
      - "traefik.http.routers.publicweb-socketio.tls.certresolver=myresolver"
      - "traefik.http.routers.publicweb-socketio.priority=20"
      - "traefik.http.routers.publicweb-socketio.service=publicweb"
      # Service port
      - "traefik.http.services.publicweb.loadbalancer.server.port=5000"
      - "traefik.http.services.publicweb.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.publicweb.loadbalancer.sticky.cookie.name=publicweb_sticky"
      # Public headers: like secure-headers but WITHOUT X-Robots-Tag noindex, so
      # ecspubleague.org gets INDEXED by Google (portal stays noindex).
      - "traefik.http.middlewares.public-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.public-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"

# publicweb's private build-output volume (see the volumes: block on the service).
# Merged with the base file's top-level volumes (redis_data, celery_data).
volumes:
  publicweb_vitedist:
